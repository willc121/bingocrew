name: Supabase Keepalive

on:
  schedule:
    # Runs daily at 8:00 AM UTC to prevent Supabase 7-day auto-pause
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run keepalive query
        run: |
          npm install @supabase/supabase-js

          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_ANON_KEY
          );
          (async () => {
            // Upsert a row to register write activity (reads alone may not count)
            const { error: upsertErr } = await supabase
              .from('keepalive')
              .upsert({ id: 1, pinged_at: new Date().toISOString() }, { onConflict: 'id' });
            if (upsertErr) {
              console.log('Upsert error (will try creating table):', upsertErr.message);
            } else {
              console.log('✅ Write query succeeded (upsert to keepalive table)');
            }

            // Read query as fallback activity
            const { data, error } = await supabase.from('cards').select('id').limit(1);
            if (error) {
              console.log('Read query note:', error.message);
            } else {
              console.log('✅ Read query succeeded, rows:', data.length);
            }

            // Auth healthcheck
            const { data: session } = await supabase.auth.getSession();
            console.log('✅ Auth endpoint reached');

            console.log('✅ Supabase keepalive complete');
          })();
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
