name: Supabase Keepalive

on:
  schedule:
    # Runs daily at 8:00 AM UTC to prevent Supabase 7-day auto-pause
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run keepalive query
        run: |
          npm install @supabase/supabase-js

          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_ANON_KEY
          );
          (async () => {
            // Read query to register activity
            const { data, error } = await supabase.from('cards').select('id').limit(1);
            if (error) {
              console.log('Read query error (table may not exist, but connection was made):', error.message);
            } else {
              console.log('✅ Read query succeeded, rows returned:', data.length);
            }

            // Auth healthcheck to register additional activity
            const { data: session, error: authErr } = await supabase.auth.getSession();
            console.log('✅ Auth endpoint reached');

            console.log('✅ Supabase keepalive complete');
          })();
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
