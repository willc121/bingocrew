name: Supabase Keepalive

on:
  schedule:
    # Runs every Monday and Thursday at 8:00 AM UTC (~every 3-4 days, well within 7-day limit)
    - cron: '0 8 * * 1,4'
  workflow_dispatch: # Allow manual trigger

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cards?select=count&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "Supabase response code: $response"
          
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase is alive and responding"
          else
            echo "❌ Supabase returned status $response"
            exit 1
          fi
